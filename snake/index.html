<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - 像素复古版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1 class="title">🐍 贪吃蛇</h1>

        <div class="info-panel">
            <div class="score">得分：<span id="score">0</span></div>
            <div class="high-score">最高分：<span id="highScore">0</span></div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button id="startBtn" class="btn btn-primary">开始游戏</button>
            <button id="pauseBtn" class="btn btn-secondary" disabled>暂停</button>
            <select id="difficulty" class="btn btn-secondary">
                <option value="easy">简单</option>
                <option value="medium" selected>中等</option>
                <option value="hard">困难</option>
            </select>
        </div>

        <div class="instructions">
            <p>使用 ↑ ↓ ← → 或 W A S D 控制方向</p>
            <p>空格键暂停/继续</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
